<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128276;</text></svg>">
<title>Reminder Agent Admin</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1f2e;--surface2:#22263a;--border:#2d3748;--accent:#63b3ed;--accent-dim:#2b6cb0;--text:#e2e8f0;--text-dim:#718096;--text-muted:#a0aec0;--green:#68d391;--green-bg:#1c4532;--red:#fc8181;--red-bg:#3d0f0f;--yellow:#f6e05e;--yellow-bg:#3d3a0f;--blue-bg:#1a365d}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }

  /* Login */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2rem; width: 320px; }
  .login-card h1 { font-size: 1.3rem; margin-bottom: 1.5rem; color: var(--accent); text-align: center; }
  .login-card input { width: 100%; padding: .6rem .8rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: .95rem; margin-bottom: 1rem; }
  .login-card input:focus { outline: 2px solid var(--accent); }

  /* Main */
  #main-screen { display: none; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: .75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 1rem; color: var(--accent); font-weight: 600; }
  .tabs { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; overflow-x: auto; }
  .tab { padding: .65rem 1.1rem; cursor: pointer; font-size: .87rem; color: var(--text-dim); border-bottom: 2px solid transparent; white-space: nowrap; transition: color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel { display: none; padding: 1.5rem; }
  .panel.active { display: block; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1.2rem; margin-bottom: 1rem; }
  .card h2 { font-size: .95rem; color: var(--accent); margin-bottom: .8rem; }

  /* Badges */
  .badge { display: inline-block; padding: .2rem .55rem; border-radius: 99px; font-size: .75rem; font-weight: 600; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-gray { background: var(--border); color: var(--text-muted); }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .badge-blue { background: var(--blue-bg); color: var(--accent); }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: .875rem; overflow-x: auto; display: block; }
  th { text-align: left; padding: .5rem .7rem; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: .5rem .7rem; border-bottom: 1px solid var(--surface2); word-break: break-all; }
  tr:hover td { background: var(--surface2); }

  /* Forms */
  .form-row { display: flex; gap: .6rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: .8rem; }
  .form-group { display: flex; flex-direction: column; gap: .3rem; flex: 1; min-width: 140px; }
  .form-group label { font-size: .78rem; color: var(--text-dim); }
  input[type=text], input[type=password], input[type=number], select {
    padding: .5rem .7rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-size: .875rem; width: 100%;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }

  /* Buttons */
  .btn { padding: .45rem .9rem; border: none; border-radius: 4px; cursor: pointer; font-size: .85rem; font-weight: 500; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent-dim); color: #fff; }
  .btn-danger { background: var(--red-bg); color: var(--red); }
  .btn-sm { padding: .3rem .6rem; font-size: .78rem; }

  /* Misc */
  .empty { color: var(--text-dim); font-style: italic; padding: 1rem 0; }
  .kv { display: grid; grid-template-columns: 160px 1fr; gap: .4rem .8rem; font-size: .875rem; }
  .kv .label { color: var(--text-dim); }
  .mono { font-family: monospace; font-size: .82rem; }
  .mt { margin-top: .8rem; }
  .detail-back { font-size: .85rem; margin-bottom: 1rem; cursor: pointer; color: var(--accent); }
  .detail-back:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <h1>Reminder Agent</h1>
    <input type="password" id="pw" placeholder="Admin password" autofocus>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    <p id="login-err" style="color:var(--red);font-size:.85rem;margin-top:.6rem;display:none"></p>
  </div>
</div>

<!-- Main Screen -->
<div id="main-screen">
  <div class="topbar">
    <h1>Reminder Agent Admin</h1>
    <button class="btn btn-sm" style="background:var(--border);color:var(--text)" onclick="doLogout()">Logout</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('status')">Status</div>
    <div class="tab" onclick="switchTab('reminders')">Reminders</div>
    <div class="tab" onclick="switchTab('logs')">Logs</div>
    <div class="tab" onclick="switchTab('onboarding')">Onboarding</div>
    <div class="tab" onclick="switchTab('config')">Config</div>
    <div class="tab" onclick="switchTab('password')">Password</div>
  </div>

  <!-- Status Panel -->
  <div id="tab-status" class="panel active"></div>

  <!-- Reminders Panel -->
  <div id="tab-reminders" class="panel"></div>

  <!-- Logs Panel -->
  <div id="tab-logs" class="panel"></div>

  <!-- Onboarding Panel -->
  <div id="tab-onboarding" class="panel"></div>

  <!-- Config Panel -->
  <div id="tab-config" class="panel">
    <div class="card">
      <h2>Agent Configuration</h2>
      <p style="color:var(--text-dim);margin-bottom:1rem">Edit runtime settings. Changes take effect immediately.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div>
          <label style="font-weight:600;display:block;margin-bottom:.3rem">config.json</label>
          <textarea id="cfg-editor" rows="16" style="width:100%;font-family:monospace;font-size:.85rem;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.5rem;resize:vertical"></textarea>
          <button class="btn btn-primary btn-sm" onclick="saveConfig()" style="margin-top:.5rem">Save</button>
          <span id="cfg-msg" style="margin-left:.5rem;font-size:.85rem"></span>
        </div>
        <div>
          <label style="font-weight:600;display:block;margin-bottom:.3rem">Field descriptions</label>
          <pre id="cfg-example" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.5rem;font-size:.82rem;overflow:auto;max-height:400px;margin:0;white-space:pre-wrap"></pre>
        </div>
      </div>
    </div>
  </div>

  <!-- Change Password (always visible when authed) -->
  <div id="tab-password" class="panel">
    <div class="card">
      <h2>Change Admin Password</h2>
      <div class="form-row">
        <div class="form-group"><label>Current Password</label><input type="password" id="chpw-current" placeholder="Current password"></div>
        <div class="form-group"><label>New Password</label><input type="password" id="chpw-new" placeholder="New password"></div>
        <button class="btn btn-primary btn-sm" style="align-self:flex-end" onclick="changePassword()">Change</button>
      </div>
      <p id="chpw-msg" style="font-size:.85rem;margin-top:.5rem;display:none"></p>
    </div>
  </div>
</div>

<script>
const API = '';

async function api(path, opts = {}) {
  const r = await fetch(API + path, { credentials: 'include', ...opts });
  if (r.status === 401) { showLogin(); throw new Error('Not authenticated'); }
  return r.json();
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
}

function showMain() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  loadStatus();
}

async function doLogin() {
  const pw = document.getElementById('pw').value;
  try {
    const r = await api('/ui/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (r.status === 'ok') showMain();
    else throw new Error('Invalid password');
  } catch (e) {
    const el = document.getElementById('login-err');
    el.textContent = 'Invalid password';
    el.style.display = 'block';
  }
}

async function doLogout() {
  await api('/ui/logout', { method: 'POST' });
  showLogin();
}

document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Tab switching
let currentTab = 'status';
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase() === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  if (name === 'status') loadStatus();
  else if (name === 'reminders') loadUsers();
  else if (name === 'logs') loadLogs();
  else if (name === 'onboarding') loadOnboarding();
  else if (name === 'config') loadConfig();
}

async function loadConfig() {
  try {
    const d = await api('/ui/config');
    document.getElementById('cfg-editor').value = JSON.stringify(d.config || {}, null, 2);
    document.getElementById('cfg-example').textContent = JSON.stringify(d.example || {}, null, 2);
  } catch (e) { document.getElementById('cfg-editor').value = '// Failed to load'; }
}
async function saveConfig() {
  const msg = document.getElementById('cfg-msg');
  try {
    const config = JSON.parse(document.getElementById('cfg-editor').value);
    await api('/ui/config', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({config}) });
    msg.style.color = '#4caf50'; msg.textContent = 'Saved';
    setTimeout(() => msg.textContent = '', 2000);
  } catch (e) { msg.style.color = '#f44336'; msg.textContent = e.message || 'Invalid JSON'; }
}

// --- Status ---
async function loadStatus() {
  const el = document.getElementById('tab-status');
  try {
    const d = await api('/ui/status');
    el.innerHTML = `
      <div class="card">
        <h2>Agent Status</h2>
        <div class="kv">
          <span class="label">Agent ID</span><span class="mono">${esc(d.agent_id)}</span>
          <span class="label">Router</span><span>${d.router_connected ? '<span class="badge badge-green">Connected</span>' : '<span class="badge badge-red">Disconnected</span>'} <span class="mono">${esc(d.router_url)}</span></span>
          <span class="label">Checker</span><span>${d.checker_running ? '<span class="badge badge-green">Running</span>' : '<span class="badge badge-red">Stopped</span>'} every ${d.check_interval} min</span>
          <span class="label">Notify hours</span><span style="font-size:.78rem">events: ${esc(d.event_notify_hours)} · tasks: ${esc(d.task_notify_hours)} · urgent: ${esc(d.urgent_task_notify_hours)}</span>
          <span class="label">LLM Agent</span><span class="mono">${esc(d.llm_agent_id)}</span>
          <span class="label">Core Agent</span><span class="mono">${esc(d.core_agent_id)}</span>
          <span class="label">Endpoint URL</span><span class="mono">${esc(d.endpoint_url)}</span>
          <span class="label">Users</span><span>${d.user_count} user(s): ${esc(d.user_ids.join(', ')) || 'none'}</span>
        </div>
        <div style="margin-top:.8rem;display:flex;gap:.5rem;align-items:center">
          <button class="btn btn-sm" style="background:var(--border);color:var(--text-muted)" onclick="refreshAgentInfo()">Refresh Agent Info</button>
          <span id="refresh-msg" style="font-size:.78rem;color:var(--text-dim)"></span>
        </div>
      </div>`;
  } catch (e) { el.innerHTML = '<p class="empty">Failed to load status.</p>'; }
}

async function refreshAgentInfo() {
  const msg = document.getElementById('refresh-msg');
  if (msg) msg.textContent = 'Refreshing...';
  try {
    const d = await api('/ui/refresh-info', { method: 'POST' });
    if (msg) msg.textContent = d.status === 'refreshed' ? 'Agent info refreshed.' : 'No change.';
  } catch (e) {
    if (msg) msg.textContent = 'Failed.';
  }
  setTimeout(() => { if (msg) msg.textContent = ''; }, 3000);
}

// --- Reminders ---
let selectedUser = null;

async function loadUsers() {
  const el = document.getElementById('tab-reminders');
  if (selectedUser) { await loadUserReminders(selectedUser); return; }
  try {
    const d = await api('/ui/users');
    if (!d.users.length) { el.innerHTML = '<p class="empty">No users with reminders yet.</p>'; return; }
    let rows = d.users.map(u => `
      <tr style="cursor:pointer" onclick="selectUser('${esc(u.user_id)}')">
        <td class="mono">${esc(u.user_id)}</td>
        <td>${u.event_count}</td>
        <td>${u.task_count}</td>
        <td>${esc(u.timezone)}</td>
        <td class="mono" style="font-size:.78rem">${esc(u.model_id || '(default)')}</td>
        <td>${esc(u.nighttime)}</td>
        <td class="mono" style="font-size:.78rem">${u.reporting_session_id ? esc(u.reporting_session_id) : '<span class="badge badge-gray">none</span>'}</td>
        <td class="mono" style="font-size:.78rem">${u.reporting_agent_id ? esc(u.reporting_agent_id) : '<span class="badge badge-gray">default</span>'}</td>
      </tr>`).join('');
    el.innerHTML = `
      <div class="card">
        <h2>Users</h2>
        <table><tr><th>User ID</th><th>Events</th><th>Tasks</th><th>Timezone</th><th>Model</th><th>Nighttime</th><th>Reporting Session</th><th>Reporting Agent</th></tr>${rows}</table>
      </div>`;
  } catch (e) { el.innerHTML = '<p class="empty">Failed to load users.</p>'; }
}

function selectUser(uid) { selectedUser = uid; loadUserReminders(uid); }
function backToUsers() { selectedUser = null; loadUsers(); }

async function loadUserReminders(uid) {
  const el = document.getElementById('tab-reminders');
  try {
    const d = await api(`/ui/users/${uid}/reminders`);
    const events = Object.values(d.events);
    const tasks = Object.values(d.tasks);
    const s = d.settings;

    let evRows = events.map(e => {
      const start = e.start?.dateTime || e.start?.date || '';
      const end = e.end?.dateTime || e.end?.date || '';
      const recur = (e.recurrence && e.recurrence.length) ? e.recurrence.join(', ') : '';
      const recurBadge = recur ? ` <span class="badge badge-blue" title="${esc(recur)}">recurring</span>` : '';
      return `<tr>
        <td class="mono" style="font-size:.78rem">${esc(e.id)}</td>
        <td>${esc(e.summary)}${recurBadge}</td>
        <td>${start}</td><td>${end}</td>
        <td><span class="badge badge-blue">${esc(e.status)}</span></td>
        <td style="font-size:.78rem">${e.last_reminded || '-'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteEvent('${esc(uid)}','${esc(e.id)}')">Del</button></td>
      </tr>`;
    }).join('') || '<tr><td colspan="7" class="empty">No events</td></tr>';

    let tkRows = tasks.map(t => {
      const badge = t.status === 'completed' ? 'badge-green' : t.urgent ? 'badge-yellow' : 'badge-gray';
      const label = t.status === 'completed' ? 'completed' : t.urgent ? 'urgent' : 'pending';
      return `<tr>
        <td class="mono" style="font-size:.78rem">${esc(t.id)}</td>
        <td>${esc(t.title)}</td>
        <td>${t.due || '-'}</td>
        <td><span class="badge ${badge}">${label}</span></td>
        <td style="font-size:.78rem">${t.last_reminded || '-'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteTask('${esc(uid)}','${esc(t.id)}')">Del</button></td>
      </tr>`;
    }).join('') || '<tr><td colspan="6" class="empty">No tasks</td></tr>';

    el.innerHTML = `
      <div class="detail-back" onclick="backToUsers()">&larr; Back to users</div>
      <div class="card">
        <h2>Settings for ${esc(uid)}</h2>
        <div class="kv">
          <span class="label">Timezone</span><span class="mono">${esc(s.timezone || 'UTC')}</span>
          <span class="label">Model</span><span class="mono">${esc(s.model_id || '(default)')}</span>
          <span class="label">Nighttime</span><span>${esc(s.nighttime_start || '?')} - ${esc(s.nighttime_end || '?')}</span>
          <span class="label">Reporting Session</span><span class="mono">${esc(s.reporting_session_id || 'not set')}</span>
          <span class="label">Reporting Agent</span><span class="mono">${esc(s.reporting_agent_id || 'default (core_personal_agent)')}</span>
        </div>
        <div class="mt form-row">
          <div class="form-group"><label>Timezone</label><input type="text" id="set-tz" value="${esc(s.timezone || 'UTC')}"></div>
          <div class="form-group"><label>Model ID</label><input type="text" id="set-mid" value="${esc(s.model_id || '')}" placeholder="(default)"></div>
          <div class="form-group"><label>Night Start</label><input type="text" id="set-ns" value="${esc(s.nighttime_start || '22:00')}"></div>
          <div class="form-group"><label>Night End</label><input type="text" id="set-ne" value="${esc(s.nighttime_end || '07:00')}"></div>
          <div class="form-group"><label>Reporting Agent</label><input type="text" id="set-ra" value="${esc(s.reporting_agent_id || '')}" placeholder="core_personal_agent"></div>
          <button class="btn btn-primary btn-sm" onclick="saveSettings('${esc(uid)}')">Save</button>
        </div>
      </div>
      <div class="card">
        <h2>Events (${events.length})</h2>
        <table><tr><th>ID</th><th>Summary</th><th>Start</th><th>End</th><th>Status</th><th>Last Reminded</th><th></th></tr>${evRows}</table>
      </div>
      <div class="card">
        <h2>Tasks (${tasks.length})</h2>
        <table><tr><th>ID</th><th>Title</th><th>Due</th><th>Status</th><th>Last Reminded</th><th></th></tr>${tkRows}</table>
      </div>
      <div class="card" id="upcoming-card">
        <h2>Upcoming Occurrences (7 days)</h2>
        <p class="empty">Loading...</p>
      </div>`;
    // Load upcoming occurrences asynchronously.
    loadUpcoming(uid);
  } catch (e) { el.innerHTML = '<p class="empty">Failed to load reminders.</p>'; }
}

async function loadUpcoming(uid) {
  const card = document.getElementById('upcoming-card');
  if (!card) return;
  try {
    const d = await api(`/ui/users/${uid}/upcoming?days=7`);
    if (!d.occurrences.length) {
      card.innerHTML = '<h2>Upcoming Occurrences (7 days)</h2><p class="empty">No upcoming events.</p>';
      return;
    }
    let rows = d.occurrences.map(o => {
      const start = o.start?.dateTime || '';
      const end = o.end?.dateTime || '';
      const recur = (o.recurrence && o.recurrence.length) ? o.recurrence.join(', ') : '-';
      const idx = o.occurrence_index != null ? `#${o.occurrence_index}` : '';
      return `<tr>
        <td class="mono" style="font-size:.78rem">${esc(o.id)}</td>
        <td>${esc(o.summary)} ${idx ? '<span class="badge badge-gray">'+idx+'</span>' : ''}</td>
        <td>${start}</td><td>${end}</td>
        <td class="mono" style="font-size:.78rem">${esc(recur)}</td>
      </tr>`;
    }).join('');
    card.innerHTML = `<h2>Upcoming Occurrences (7 days) — ${d.occurrences.length} event(s)</h2>
      <table><tr><th>Event ID</th><th>Summary</th><th>Start</th><th>End</th><th>Recurrence</th></tr>${rows}</table>`;
  } catch (e) {
    card.innerHTML = '<h2>Upcoming Occurrences (7 days)</h2><p class="empty">Failed to load.</p>';
  }
}

async function saveSettings(uid) {
  const tz = document.getElementById('set-tz').value;
  const mid = document.getElementById('set-mid').value.trim();
  const ns = document.getElementById('set-ns').value;
  const ne = document.getElementById('set-ne').value;
  const ra = document.getElementById('set-ra').value.trim();
  const body = { timezone: tz, nighttime_start: ns, nighttime_end: ne, model_id: mid || null };
  if (ra) body.reporting_agent_id = ra;
  await api(`/ui/users/${uid}/settings`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  loadUserReminders(uid);
}

async function deleteEvent(uid, eid) {
  if (!confirm('Delete this event?')) return;
  await api(`/ui/users/${uid}/events/${eid}`, { method: 'DELETE' });
  loadUserReminders(uid);
}

async function deleteTask(uid, tid) {
  if (!confirm('Delete this task?')) return;
  await api(`/ui/users/${uid}/tasks/${tid}`, { method: 'DELETE' });
  loadUserReminders(uid);
}

// --- Logs ---
async function loadLogs() {
  const el = document.getElementById('tab-logs');
  try {
    const d = await api('/ui/logs?limit=50');
    if (!d.logs.length) { el.innerHTML = '<p class="empty">No execution logs yet.</p>'; return; }
    let rows = d.logs.map(l => {
      const badge = l.status === 'completed' ? 'badge-green' : l.status === 'error' ? 'badge-red' : l.status === 'timeout' ? 'badge-yellow' : 'badge-gray';
      return `<tr>
        <td class="mono" style="font-size:.78rem">${esc(l.task_id)}</td>
        <td class="mono">${esc(l.user_id) || '-'}</td>
        <td><span class="badge ${badge}">${l.status}</span></td>
        <td>${l.iterations || '-'}</td>
        <td>${l.tool_calls || '-'}</td>
        <td style="font-size:.78rem">${l.started_at || '-'}</td>
      </tr>`;
    }).join('');
    el.innerHTML = `
      <div class="card">
        <h2>Execution Logs</h2>
        <table><tr><th>Task ID</th><th>User</th><th>Status</th><th>Iterations</th><th>Tool Calls</th><th>Started</th></tr>${rows}</table>
      </div>`;
  } catch (e) { el.innerHTML = '<p class="empty">Failed to load logs.</p>'; }
}

// --- Onboarding ---
async function loadOnboarding() {
  const el = document.getElementById('tab-onboarding');
  try {
    const d = await api('/ui/onboarding');
    el.innerHTML = `
      <div class="card">
        <h2>Router Registration</h2>
        <div class="kv">
          <span class="label">Router URL</span><span class="mono">${esc(d.router_url)}</span>
          <span class="label">Agent ID</span><span class="mono">${esc(d.agent_id)}</span>
          <span class="label">Endpoint URL</span><span class="mono">${esc(d.endpoint_url)}</span>
          <span class="label">Registered</span><span>${d.registered ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-red">No</span>'}</span>
          <span class="label">Router Reachable</span><span>${d.router_reachable ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-red">No</span>'}</span>
          <span class="label">Destinations</span><span>${esc(d.available_destinations.join(', ')) || 'none'}</span>
        </div>
        <div class="mt form-row">
          <div class="form-group"><label>Invitation Token</label><input type="text" id="inv-token" placeholder="Paste invitation token"></div>
          <button class="btn btn-primary btn-sm" onclick="doRegister()">Register</button>
        </div>
        <p id="reg-result" style="font-size:.85rem;margin-top:.5rem;display:none"></p>
      </div>`;
  } catch (e) { el.innerHTML = '<p class="empty">Failed to load onboarding info.</p>'; }
}

async function doRegister() {
  const token = document.getElementById('inv-token').value.trim();
  if (!token) return;
  const el = document.getElementById('reg-result');
  try {
    const r = await api('/ui/onboarding/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ invitation_token: token })
    });
    el.style.display = 'block';
    if (r.status === 'ok') {
      el.style.color = 'var(--green)';
      el.textContent = `Registered as ${r.agent_id}`;
      setTimeout(loadOnboarding, 1500);
    } else {
      el.style.color = 'var(--red)';
      el.textContent = r.detail || 'Registration failed';
    }
  } catch (e) {
    el.style.display = 'block';
    el.style.color = 'var(--red)';
    el.textContent = 'Error: ' + e.message;
  }
}

// --- Change Password ---
async function changePassword() {
  const cur = document.getElementById('chpw-current').value;
  const nw = document.getElementById('chpw-new').value;
  const el = document.getElementById('chpw-msg');
  if (!cur || !nw) { el.style.display='block'; el.style.color='var(--red)'; el.textContent='Both fields required'; return; }
  try {
    const r = await api('/ui/change-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ current_password: cur, new_password: nw }),
    });
    el.style.display = 'block';
    if (r.status === 'ok') {
      el.style.color = 'var(--green)'; el.textContent = 'Password changed successfully';
      document.getElementById('chpw-current').value = '';
      document.getElementById('chpw-new').value = '';
    } else {
      el.style.color = 'var(--red)'; el.textContent = r.detail || 'Error changing password';
    }
  } catch (e) { el.style.display='block'; el.style.color='var(--red)'; el.textContent='Error: '+e.message; }
}

// Init
(async () => {
  try {
    const r = await api('/ui/whoami');
    if (r.authenticated) showMain();
  } catch (e) {}
})();
