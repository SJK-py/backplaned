services:
  coding-agent:
    build:
      context: ..
      dockerfile: coding_agent/Dockerfile
    ports:
      - "8100:8100"
    volumes:
      - coding-data:/data
      # Mount helper.py from parent project
      - ../helper.py:/app/helper.py:ro
    env_file:
      - .env
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Drop NET_RAW to prevent raw socket abuse (port scanning, packet crafting).
    cap_drop:
      - NET_RAW
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

volumes:
  coding-data:
