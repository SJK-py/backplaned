services:
  # ── Router + embedded agents + lightweight external agents ──────────
  router:
    build:
      context: ..
      dockerfile: docker/Dockerfile.router
    ports:
      - "${ROUTER_PORT:-8000}:8000"
      - "${WEB_ADMIN_PORT:-8080}:8080"
      - "${CHANNEL_PORT:-8081}:8081"
      - "${MCP_AGENT_PORT:-8082}:8082"
      - "${MCP_SERVER_PORT:-8083}:8083"
      - "${MCP_PORT:-8084}:8084"
      - "${CRON_PORT:-8085}:8085"
      - "${KB_PORT:-8086}:8086"
      - "${REMINDER_PORT:-8101}:8101"
    volumes:
      # start.config is sourced by start.sh inside the container
      - ../start.config:/app/start.config:ro
      # Persistent data
      - "${DATA_ROOT:-./data}/router:/app/data"
      - "${DATA_ROOT:-./data}/proxyfiles:/app/proxyfiles"
      # Embedded agents (config.json + runtime data)
      - "${DATA_ROOT:-./data}/core_personal_agent:/app/agents/core_personal_agent/data"
      - "${DATA_ROOT:-./data}/llm_agent:/app/agents/llm_agent/data"
      - "${DATA_ROOT:-./data}/memory_agent:/app/agents/memory_agent/data"
      - "${DATA_ROOT:-./data}/web_agent:/app/agents/web_agent/data"
      - "${DATA_ROOT:-./data}/md_converter:/app/agents/md_converter/data"
      # External agents (config.json + .env + runtime data)
      - "${DATA_ROOT:-./data}/channel_agent:/app/agents_external/channel_agent/data"
      - "${DATA_ROOT:-./data}/mcp_agent:/app/agents_external/mcp_agent/data"
      - "${DATA_ROOT:-./data}/mcp_server:/app/agents_external/mcp_server/data"
      - "${DATA_ROOT:-./data}/cron_agent:/app/agents_external/cron_agent/data"
      - "${DATA_ROOT:-./data}/kb_agent:/app/agents_external/kb_agent/data"
      - "${DATA_ROOT:-./data}/reminder_agent:/app/agents_external/reminder_agent/data"
      - "${DATA_ROOT:-./data}/web_admin:/app/agents_external/web_admin/data"
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      # Optional router tuning (uncomment to override defaults)
      # - EMBEDDED_AGENT_TIMEOUT=${EMBEDDED_AGENT_TIMEOUT:-720}
      # - GLOBAL_TIMEOUT_HOURS=${GLOBAL_TIMEOUT_HOURS:-1}
      # - MAX_DEPTH=${MAX_DEPTH:-10}
      # - MAX_WIDTH=${MAX_WIDTH:-50}
    restart: unless-stopped

  # ── Coding Agent (isolated sandbox) ─────────────────────────────────
  coding:
    build:
      context: ..
      dockerfile: docker/Dockerfile.coding
    ports:
      - "${CODING_PORT:-8100}:8100"
    volumes:
      - "${DATA_ROOT:-./data}/coding_agent:/app/data"
    environment:
      - ROUTER_URL=http://router:8000
      - AGENT_URL=http://coding:8100
      - AGENT_PORT=8100
      - ADMIN_PASSWORD=${CODING_ADMIN_PASSWORD:-}
    depends_on:
      - router
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
